<aside class="sidebar">

  <div class="sidebar-header">
    <div class="logo-box">
      <lucide-icon [img]="Building2" class="icon-sm"></lucide-icon>
    </div>
    <div class="logo-text-wrap">
      <p class="logo-title">İnşaatERP</p>
      <p class="logo-subtitle">Taahhüt Platformu</p>
    </div>
  </div>

  <div class="sidebar-search-container">
    <div class="search-box">
      <lucide-icon [img]="Search" class="icon-xs text-muted"></lucide-icon>
      <span class="search-text">Ara...</span>
      <kbd class="search-kbd">⌘K</kbd>
    </div>
  </div>

  <nav class="sidebar-nav">
    @for (group of modules; track group.label) {
      <div class="nav-group">
        <p class="nav-group-label">{{ group.label }}</p>
        <ul class="nav-list">
          @for (item of group.items; track item.href) {
            <li>
              <a [routerLink]="item.href" routerLinkActive="active" class="nav-item">
                <lucide-icon [img]="item.icon" size="14" class="nav-icon"></lucide-icon>
                <span class="nav-label">{{ item.label }}</span>

                @if (item.badge) {
                  <span class="nav-badge" [ngClass]="item.badge === 'YZ' ? 'badge-ai' : 'badge-danger'">
                    {{ item.badge }}
                  </span>
                }

                <lucide-icon [img]="ChevronRight" size="14" class="nav-chevron"></lucide-icon>
              </a>
            </li>
          }
        </ul>
      </div>
    }
  </nav>

  <div class="sidebar-footer">
    <div class="user-avatar">AY</div>
    <div class="user-info">
      <p class="user-name">Ahmet Yıldız</p>
      <p class="user-role">Genel Müdür</p>
    </div>
    <div class="user-actions">
      <button class="action-btn">
        <lucide-icon [img]="Bell" class="icon-xs"></lucide-icon>
      </button>
      <button class="action-btn">
        <lucide-icon [img]="Settings" class="icon-xs"></lucide-icon>
      </button>
    </div>
  </div>
</aside>
